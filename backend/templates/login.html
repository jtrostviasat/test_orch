{% extends "base.html" %}
{% block title %}Login - test_orch{% endblock %}
{% block content %}
  <div class="panel" style="max-width:420px; margin:60px auto;">
    <h1>Sign in</h1>
    {% if error %}<p class="sentinel-warn">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <p>
        <label>Username<br />
          <input name="username" autocomplete="username" required
                 style="width:100%; padding:8px; margin-top:4px;" />
        </label>
      </p>
      <p>
        <label>Password<br />
          <input name="password" type="password" autocomplete="current-password" required
                 style="width:100%; padding:8px; margin-top:4px;" />
        </label>
      </p>
      <button type="submit">Sign in</button>
    </form>
    <p style="color:#8b949e; font-size:12px; margin-top:12px;">
      Authenticates against the corporate LDAP directory.
    </p>
  </div>
{% endblock %}
